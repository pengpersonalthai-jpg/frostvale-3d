<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frostvale — The Veiled Vale</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>❄️</text></svg>" />
  <style>
    :root {
      --ice: #a8c8e8;
      --amber: #e8b06a;
      --panel: rgba(8, 12, 24, 0.72);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #05070f; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      color: #dde6f2;
      user-select: none;
    }
    canvas { display: block; }

    /* ---- Start / pause overlay ---- */
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
      background: radial-gradient(ellipse at center, rgba(10, 16, 34, 0.55) 0%, rgba(4, 6, 14, 0.88) 100%);
      backdrop-filter: blur(2px);
      cursor: pointer;
      z-index: 20;
      text-align: center;
      transition: opacity 0.4s ease;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    #overlay h1 {
      font-size: clamp(2.4rem, 7vw, 4.6rem);
      font-weight: normal;
      letter-spacing: 0.45em;
      margin-left: 0.45em; /* optically re-center the letter-spaced text */
      color: #eef4fd;
      text-shadow: 0 0 24px rgba(120, 180, 255, 0.55), 0 0 90px rgba(80, 140, 255, 0.25);
    }
    #overlay .subtitle {
      font-style: italic;
      color: var(--ice);
      font-size: clamp(0.9rem, 2.2vw, 1.15rem);
      letter-spacing: 0.12em;
      opacity: 0.9;
    }
    #overlay .enter {
      margin-top: 26px;
      font-size: 1rem;
      letter-spacing: 0.3em;
      color: var(--amber);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
    #overlay .controls-card {
      margin-top: 10px;
      background: var(--panel);
      border: 1px solid rgba(140, 180, 230, 0.25);
      border-radius: 10px;
      padding: 16px 28px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.85rem;
      line-height: 1.9;
      color: #b9c8dd;
      text-align: left;
    }
    #overlay .controls-card b { color: #eef4fd; font-weight: 600; }
    #overlay kbd {
      display: inline-block; min-width: 1.6em; text-align: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 4px; padding: 0 5px; margin-right: 6px;
      font-family: inherit; font-size: 0.8rem; color: #eef4fd;
    }

    /* ---- In-game HUD ---- */
    #hud {
      position: fixed; left: 16px; bottom: 14px;
      z-index: 10; pointer-events: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.78rem; line-height: 1.75;
      color: rgba(200, 216, 238, 0.85);
      background: var(--panel);
      border: 1px solid rgba(140, 180, 230, 0.18);
      border-radius: 8px;
      padding: 10px 16px;
      opacity: 0; transition: opacity 0.5s ease;
    }
    #hud.visible { opacity: 1; }
    #hud .mode { color: var(--amber); letter-spacing: 0.15em; font-size: 0.7rem; }
    #hud kbd {
      display: inline-block; min-width: 1.5em; text-align: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 3px; padding: 0 4px; margin-right: 5px;
      font-size: 0.72rem; color: #eef4fd;
    }

    /* ---- Interaction prompt (mount / dismount) ---- */
    #prompt {
      position: fixed; left: 50%; bottom: 18%;
      transform: translateX(-50%);
      z-index: 10; pointer-events: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.95rem; letter-spacing: 0.06em;
      color: #f2e8d5;
      background: var(--panel);
      border: 1px solid rgba(232, 176, 106, 0.45);
      border-radius: 8px;
      padding: 10px 22px;
      opacity: 0; transition: opacity 0.25s ease;
      text-shadow: 0 0 12px rgba(232, 176, 106, 0.4);
    }
    #prompt.visible { opacity: 1; }
    #prompt kbd {
      display: inline-block; min-width: 1.6em; text-align: center;
      background: rgba(232, 176, 106, 0.15);
      border: 1px solid rgba(232, 176, 106, 0.5);
      border-radius: 4px; padding: 1px 7px; margin-right: 9px;
      color: var(--amber); font-family: inherit;
    }

    /* ---- Zone name toast shown on first entry ---- */
    #zone-toast {
      position: fixed; left: 50%; top: 16%;
      transform: translateX(-50%);
      z-index: 10; pointer-events: none; text-align: center;
      opacity: 0; transition: opacity 1.6s ease;
    }
    #zone-toast.visible { opacity: 1; }
    #zone-toast .name {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      letter-spacing: 0.35em; margin-left: 0.35em;
      color: #eef4fd;
      text-shadow: 0 0 22px rgba(120, 180, 255, 0.6);
    }
    #zone-toast .sub {
      font-style: italic; color: var(--ice);
      letter-spacing: 0.1em; margin-top: 6px; font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>FROSTVALE</h1>
    <div class="subtitle">The Veiled Vale &mdash; a silent valley beneath the Skyshard Peaks</div>
    <div class="controls-card" id="overlay-controls">
      <b>On foot</b><br />
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &nbsp;&middot;&nbsp; <kbd>Mouse</kbd> look<br />
      <kbd>Shift</kbd> sprint &nbsp;&middot;&nbsp; <kbd>Space</kbd> jump &nbsp;&middot;&nbsp; <kbd>E</kbd> mount a horse<br />
      <b>Mounted</b><br />
      <kbd>W</kbd>/<kbd>S</kbd> ride / halt &nbsp;&middot;&nbsp; <kbd>A</kbd>/<kbd>D</kbd> steer<br />
      <kbd>Shift</kbd> gallop &nbsp;&middot;&nbsp; <kbd>E</kbd> dismount &nbsp;&middot;&nbsp; <kbd>Esc</kbd> release mouse
    </div>
    <div class="enter" id="enter-hint">CLICK TO ENTER THE VALE</div>
  </div>

  <div id="hud"></div>
  <div id="prompt"></div>
  <div id="zone-toast">
    <div class="name">FROSTVALE</div>
    <div class="sub">The Veiled Vale</div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
